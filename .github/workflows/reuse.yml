name: REUSE Compliance

# Ensures every tracked file declares copyright and license info, so the
# AGPL-3.0 core and the MIT @evalution/vercel-ai-sdk adapter stay cleanly
# separated and auditable. See LICENSING.md.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5
